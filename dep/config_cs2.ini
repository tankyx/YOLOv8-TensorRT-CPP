ModelPath = yolov8n_cs2_fp16.onnx
CaptureWidth = 640
CaptureHeight = 640
Precision = half
HeadLabelID1 = 1
HeadLabelID2 = 3
TrackCrosshair = false
CrosshairTemplate = crosshair.png
MouseSensitivity = 0.80
AimFOV = 55
MinGain = 0.25
MaxGain = 0.65
MaxSpeed = 15
# Smoothing knob 1-10 (1=snappy, 10=very smooth). Mapped internally to a per-frame
# multiplier on the screen-pixel delta. 5 is a balanced default.
Smoothing = 10
# Multiplier on the raw screen-pixel delta for the RMB-only debug snap path.
# Translates ROI pixels into mouse counts for your in-game sens. Tune up if
# RMB still drifts toward target; tune down if it overshoots past the target.
DebugSnapGain = 3.0
# When true, holding RMB engages the unsmoothed snap-aim (debug). When false,
# RMB does nothing — only LMB triggers the aim.
DebugAimEnabled = false
CPI = 3000
Labels = c, ch, t, th
HidVendorId = 0x3367
HidProductId = 0x1978
HidSerial =
DebugView = false
DebugOverlayTargetProcess = cs2.exe
# Direct GPU capture via DXGI/CUDA interop. Skips the GPU->CPU map and host upload that the
# legacy capture path goes through. Mutually exclusive with TrackCrosshair (CPU template match
# still needs a cv::Mat); composes fine with DebugView since the overlay only consumes
# detection metadata. Default true after c41.
UseDirectGpuCapture = true