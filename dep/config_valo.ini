# ONNX model path. Supports YOLOv8, YOLOv11, and YOLOv26 models.
# The detector auto-detects the version from filename and output shape.
ModelPath = yolov8n_val_fp16.onnx
# YOLO model version: auto (default), v8, v11, or v26.
#   auto — detect from filename, then output shape
#   v8   — force YOLOv8 path (xywh decode + NMS)
#   v11  — force YOLOv11 path (DFL softmax decode + NMS)
#   v26  — force YOLOv26 path (end-to-end, no NMS)
ModelVersion = auto
CaptureWidth = 320
CaptureHeight = 320
# Precision: half (FP16, recommended) or float (FP32).
# FP16 is faster — use it unless your GPU doesn't support it.
Precision = half
HeadLabelID1 = 1
HeadLabelID2 = 1
TrackCrosshair = false
CrosshairTemplate = crosshair.png
MouseSensitivity = 0.80
AimFOV = 50
MinGain = 0.25
MaxGain = 0.65
MaxSpeed = 20
CPI = 3000
Labels = ENEMY_BODY, ENEMY_HEAD
HidVendorId = 0x3367
HidProductId = 0x1978
HidSerial =
DebugView = true
DebugViewOpenCV = true
DebugOverlayTargetProcess = VALORANT-Win64-Shipping.exe
CaptureFPS=240
UseFusion=false
PinThreads=true
CaptureThreadCore=0
FusionThreadCore=2
UseDirectGpuCapture = true
# Optional: write a JSON status file for external monitoring (e.g. codewhale).
# Leave empty to disable. Example: MetricsStatus = status.json
MetricsStatus = status.json
